name: SimulIDE Build & Release (Windows)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versão/Tag (ex.: v2.0.0 ou v2.0.0-RC1)"
        required: true
        type: string
      notes:
        description: "Notas da release (opcional)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  # ─── 1. Normalizar versão ──────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      base_version: ${{ steps.ver.outputs.base_version }}
      zip_name:     ${{ steps.ver.outputs.zip_name }}
    steps:
      - name: Normalizar versão
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          RAW="${{ inputs.version }}"
          RAW="${RAW//[[:space:]]/}"
          CLEAN="${RAW#[vV]}"
          BASE=$(echo "$CLEAN" | sed 's/-[A-Za-z].*//')
          echo "base_version=$CLEAN"                                >> "$GITHUB_OUTPUT"
          echo "zip_name=SimulIDE-${CLEAN}-Windows.zip"             >> "$GITHUB_OUTPUT"

  # ─── 2. Compilar Windows com Qt 5.15.2 + MinGW ────────────────────────
  build-windows:
    runs-on: windows-latest
    needs: prepare
    env:
      ZIP_NAME: ${{ needs.prepare.outputs.zip_name }}
      BASE_VERSION: ${{ needs.prepare.outputs.base_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Qt 5.15.2 (MinGW 8.1)
        uses: jurplel/install-qt-action@v4
        with:
          version: "5.15.2"
          host: "windows"
          target: "desktop"
          arch: "win64_mingw81"
          tools: "tools_mingw810"
          cache: true

      - name: Adicionar MinGW ao PATH
        shell: powershell
        run: |
          # Listar o que foi instalado para debug
          Write-Output "=== IQTA_TOOLS=$env:IQTA_TOOLS ==="
          Write-Output "=== Qt5_DIR=$env:Qt5_DIR ==="

          $searchPaths = @()

          # 1. IQTA_TOOLS (definido pela install-qt-action)
          if ($env:IQTA_TOOLS -and (Test-Path $env:IQTA_TOOLS)) {
            $searchPaths += $env:IQTA_TOOLS
          }

          # 2. Relativo ao Qt5_DIR: ../../Tools
          if ($env:Qt5_DIR) {
            $toolsFromQt = Join-Path (Split-Path (Split-Path $env:Qt5_DIR)) "Tools"
            if (Test-Path $toolsFromQt) { $searchPaths += $toolsFromQt }
          }

          # 3. RUNNER_TOOL_CACHE/Qt/Tools
          $rtcTools = "$env:RUNNER_TOOL_CACHE\Qt\Tools"
          if (Test-Path $rtcTools) { $searchPaths += $rtcTools }

          # 4. D:\a\_temp (onde a action frequentemente instala)
          if (Test-Path "D:\a\_temp") { $searchPaths += "D:\a\_temp" }

          $mingwBin = $null
          foreach ($base in $searchPaths) {
            Write-Output "Procurando MinGW em: $base"
            $found = Get-ChildItem $base -Filter "mingw*" -Directory -ErrorAction SilentlyContinue |
                     Where-Object { Test-Path "$($_.FullName)\bin\g++.exe" } |
                     Select-Object -First 1
            if ($found) {
              $mingwBin = "$($found.FullName)\bin"
              break
            }
            # Buscar um nível mais fundo
            $found = Get-ChildItem $base -Directory -ErrorAction SilentlyContinue |
                     ForEach-Object { Get-ChildItem $_.FullName -Filter "mingw*" -Directory -ErrorAction SilentlyContinue } |
                     Where-Object { Test-Path "$($_.FullName)\bin\g++.exe" } |
                     Select-Object -First 1
            if ($found) {
              $mingwBin = "$($found.FullName)\bin"
              break
            }
          }

          if (-not $mingwBin) {
            Write-Output "=== Conteúdo dos caminhos pesquisados ==="
            foreach ($p in $searchPaths) {
              Write-Output "--- $p ---"
              Get-ChildItem $p -Depth 2 -ErrorAction SilentlyContinue | Select-Object FullName
            }
            Write-Error "MinGW não encontrado!"
            exit 1
          }

          Write-Output "MinGW encontrado em: $mingwBin"
          "$mingwBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verificar ferramentas
        shell: powershell
        run: |
          Write-Output "=== qmake ==="
          qmake --version
          Write-Output "=== g++ ==="
          g++ --version
          Write-Output "=== mingw32-make ==="
          mingw32-make --version

      - name: Instalar zlib (dependência)
        shell: powershell
        run: |
          # Baixar zlib pré-compilado para MinGW
          $zlibUrl = "https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-zlib-1.3.1-1-any.pkg.tar.zst"
          $zlibPkg = "$env:TEMP\zlib.pkg.tar.zst"

          # Tentar instalar via pacman do MSYS2 que já vem no runner
          if (Test-Path "C:\msys64\usr\bin\pacman.exe") {
            Write-Output "Instalando zlib via MSYS2 pacman..."
            C:\msys64\usr\bin\bash.exe -lc "pacman -S --noconfirm mingw-w64-x86_64-zlib"
            # Copiar headers e libs para o MinGW do Qt
            $msysMinGW = "C:\msys64\mingw64"
            $qtMinGW = (Split-Path (Get-Command g++).Source)
            $qtMinGWRoot = Split-Path $qtMinGW
            if (Test-Path "$msysMinGW\include\zlib.h") {
              Copy-Item "$msysMinGW\include\zlib.h" "$qtMinGWRoot\include\" -Force -ErrorAction SilentlyContinue
              Copy-Item "$msysMinGW\include\zconf.h" "$qtMinGWRoot\include\" -Force -ErrorAction SilentlyContinue
              Copy-Item "$msysMinGW\lib\libz.a"      "$qtMinGWRoot\lib\"     -Force -ErrorAction SilentlyContinue
              Copy-Item "$msysMinGW\lib\libz.dll.a"  "$qtMinGWRoot\lib\"     -Force -ErrorAction SilentlyContinue
              Copy-Item "$msysMinGW\bin\zlib1.dll"   "$qtMinGWRoot\bin\"     -Force -ErrorAction SilentlyContinue
              Write-Output "zlib copiado para MinGW do Qt"
            }
          } else {
            Write-Warning "MSYS2 não encontrado; zlib pode já estar incluído no MinGW"
          }

      - name: Compilar SimulIDE (qmake + mingw32-make)
        shell: powershell
        run: |
          Set-Location build_XX
          New-Item -ItemType Directory -Force -Path build | Out-Null
          qmake SimulIDE_Build.pro -spec win32-g++ "CONFIG+=release"
          mingw32-make -j $env:NUMBER_OF_PROCESSORS

      - name: Empacotar com windeployqt
        shell: powershell
        run: |
          # Localizar o executável compilado
          $exeDir = Get-ChildItem "build_XX\executables" -Filter "simulide.exe" -Recurse |
                    Select-Object -First 1 -ExpandProperty DirectoryName
          if (-not $exeDir) {
            Write-Error "simulide.exe não encontrado!"
            exit 1
          }
          Write-Output "Executável encontrado em: $exeDir"

          # Copiar dados do projeto
          if (Test-Path "resources\data") {
            Copy-Item "resources\data" "$exeDir\data" -Recurse -Force
          }
          if (Test-Path "resources\qm") {
            Copy-Item "resources\qm" "$exeDir\translations" -Recurse -Force
          }

          # Rodar windeployqt
          windeployqt --release --no-translations --no-opengl-sw "$exeDir\simulide.exe"

          # Copiar zlib DLL se existir
          $zlibDll = "C:\msys64\mingw64\bin\zlib1.dll"
          if (Test-Path $zlibDll) {
            Copy-Item $zlibDll "$exeDir\" -Force
          }

          # Criar ZIP
          Compress-Archive -Path "$exeDir\*" -DestinationPath "$env:ZIP_NAME" -Force
          Write-Output "Pacote criado: $env:ZIP_NAME"

      - name: Upload artefato Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: ${{ env.ZIP_NAME }}
          if-no-files-found: error

  # ─── 3. Criar GitHub Release ──────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    needs: [prepare, build-windows]
    steps:
      - name: Download artefato Windows
        uses: actions/download-artifact@v4
        with:
          name: windows-zip

      - name: Criar Release e anexar artefatos
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: "SimulIDE ${{ inputs.version }}"
          body: ${{ inputs.notes }}
          prerelease: false
          target_commitish: ${{ github.sha }}
          files: |
            ${{ needs.prepare.outputs.zip_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
