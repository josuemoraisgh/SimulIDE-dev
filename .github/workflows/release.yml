name: SimulIDE Build & Release (Windows)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versão/Tag (ex.: v2.0.0 ou v2.0.0-RC1)"
        required: true
        type: string
      notes:
        description: "Notas da release (opcional)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  # ─── 1. Normalizar versão ──────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      base_version: ${{ steps.ver.outputs.base_version }}
      zip_name:     ${{ steps.ver.outputs.zip_name }}
    steps:
      - name: Normalizar versão
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          RAW="${{ inputs.version }}"
          RAW="${RAW//[[:space:]]/}"
          CLEAN="${RAW#[vV]}"
          BASE=$(echo "$CLEAN" | sed 's/-[A-Za-z].*//')
          echo "base_version=$CLEAN"                                >> "$GITHUB_OUTPUT"
          echo "zip_name=SimulIDE-${CLEAN}-Windows.zip"             >> "$GITHUB_OUTPUT"

  # ─── 2. Compilar Windows com Qt 5.15.2 + MinGW ────────────────────────
  build-windows:
    runs-on: windows-latest
    needs: prepare
    env:
      ZIP_NAME: ${{ needs.prepare.outputs.zip_name }}
      BASE_VERSION: ${{ needs.prepare.outputs.base_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Qt 5.15.2 (MinGW 8.1)
        uses: jurplel/install-qt-action@v4
        with:
          version: "5.15.2"
          host: "windows"
          target: "desktop"
          arch: "win64_mingw81"
          cache: true

      - name: Instalar MinGW 8.1 via MSYS2
        shell: powershell
        run: |
          # Usar o MSYS2 pré-instalado no runner para obter MinGW 8.1 toolchain
          # O runner windows-latest já tem MSYS2 em C:\msys64
          # Instalar mingw-w64-x86_64-gcc (que inclui g++, mingw32-make, etc.)
          C:\msys64\usr\bin\bash.exe -lc "pacman -S --noconfirm mingw-w64-x86_64-toolchain"

          # Adicionar ao PATH
          $mingwBin = "C:\msys64\mingw64\bin"
          if (-not (Test-Path "$mingwBin\g++.exe")) {
            Write-Error "g++.exe não encontrado em $mingwBin"
            exit 1
          }
          Write-Output "MinGW encontrado em: $mingwBin"
          "$mingwBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verificar ferramentas
        shell: powershell
        run: |
          Write-Output "=== qmake ==="
          qmake --version
          Write-Output "=== g++ ==="
          g++ --version
          Write-Output "=== mingw32-make ==="
          mingw32-make --version

      - name: Instalar zlib (dependência)
        shell: powershell
        run: |
          # zlib via MSYS2 (mesmo MinGW que usamos para compilar)
          C:\msys64\usr\bin\bash.exe -lc "pacman -S --noconfirm mingw-w64-x86_64-zlib"
          Write-Output "zlib instalado em C:\msys64\mingw64"

      - name: Compilar SimulIDE (qmake + mingw32-make)
        shell: powershell
        run: |
          Set-Location build_XX
          New-Item -ItemType Directory -Force -Path build | Out-Null
          qmake SimulIDE_Build.pro -spec win32-g++ "CONFIG+=release"
          mingw32-make -j $env:NUMBER_OF_PROCESSORS

      - name: Empacotar com windeployqt
        shell: powershell
        run: |
          # Localizar o executável compilado
          $exeDir = Get-ChildItem "build_XX\executables" -Filter "simulide.exe" -Recurse |
                    Select-Object -First 1 -ExpandProperty DirectoryName
          if (-not $exeDir) {
            Write-Error "simulide.exe não encontrado!"
            exit 1
          }
          Write-Output "Executável encontrado em: $exeDir"

          # Copiar dados do projeto
          if (Test-Path "resources\data") {
            Copy-Item "resources\data" "$exeDir\data" -Recurse -Force
          }
          if (Test-Path "resources\qm") {
            Copy-Item "resources\qm" "$exeDir\translations" -Recurse -Force
          }

          # Garantir que o diretório bin do Qt está no PATH (windeployqt precisa
          # encontrar os plugins de plataforma para funcionar corretamente)
          $qtBin = Join-Path $env:QT_ROOT_DIR "bin"
          $env:PATH = "$qtBin;$env:PATH"
          Write-Output "Qt bin adicionado ao PATH: $qtBin"

          # Rodar windeployqt (pode falhar ao não encontrar o plugin de plataforma)
          & "$qtBin\windeployqt.exe" --release --no-translations --no-opengl-sw "$exeDir\simulide.exe"
          $wdqtExitCode = $LASTEXITCODE

          # Garantir que o plugin de plataforma (qwindows.dll) está no diretório de destino.
          # windeployqt às vezes não consegue localizá-lo e sai com código 1; copiamos
          # manualmente e só ignoramos o código de erro quando a cópia for bem-sucedida.
          $platformsSrc = Join-Path $env:QT_ROOT_DIR "plugins\platforms"
          $platformsDst = Join-Path $exeDir "platforms"
          New-Item -ItemType Directory -Force -Path $platformsDst | Out-Null
          $pluginSrc = Join-Path $platformsSrc "qwindows.dll"
          $pluginDst = Join-Path $platformsDst "qwindows.dll"
          if (Test-Path $pluginSrc) {
            Copy-Item $pluginSrc $platformsDst -Force
            if (-not (Test-Path $pluginDst)) {
              Write-Error "Falha ao copiar qwindows.dll para $platformsDst"
              exit 1
            }
            Write-Output "Plugin de plataforma copiado: qwindows.dll"
            # qwindows.dll foi copiado com sucesso: o erro do windeployqt é recuperável
            $global:LASTEXITCODE = 0
          } elseif ($wdqtExitCode -ne 0) {
            # Plugin não foi encontrado na instalação do Qt e windeployqt falhou
            Write-Error "qwindows.dll não encontrado em $platformsSrc e windeployqt falhou (código $wdqtExitCode)"
            exit $wdqtExitCode
          }

          # Copiar zlib DLL se existir
          $zlibDll = "C:\msys64\mingw64\bin\zlib1.dll"
          if (Test-Path $zlibDll) {
            Copy-Item $zlibDll "$exeDir\" -Force
          }

          # Criar ZIP
          Compress-Archive -Path "$exeDir\*" -DestinationPath "$env:ZIP_NAME" -Force
          Write-Output "Pacote criado: $env:ZIP_NAME"

      - name: Upload artefato Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: ${{ env.ZIP_NAME }}
          if-no-files-found: error

  # ─── 3. Criar GitHub Release ──────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    needs: [prepare, build-windows]
    steps:
      - name: Download artefato Windows
        uses: actions/download-artifact@v4
        with:
          name: windows-zip

      - name: Criar Release e anexar artefatos
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: "SimulIDE ${{ inputs.version }}"
          body: ${{ inputs.notes }}
          prerelease: false
          target_commitish: ${{ github.sha }}
          files: |
            ${{ needs.prepare.outputs.zip_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
